<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 350px;
        }
        input { width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:5px; }
        button { width:100%; padding:10px; background:#667eea; color:white; border:none; border-radius:5px; cursor:pointer; }
        .error { color:red; margin-top:10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Login</h2>
        <div id="errorMsg" class="error"></div>
        <input type="text" id="username" placeholder="Username" value="student1">
        <input type="password" id="password" placeholder="Password" value="student123">
        <button onclick="login()">Login</button>
        <p style="margin-top:20px;">Don't have an account? <a href="/register">Register</a></p>
    </div>
    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            const data = await response.json();
            if (response.ok && data.success) {
                window.location.href = '/dashboard';
            } else {
                document.getElementById('errorMsg').innerText = data.message;
            }
        }
    </script>
</body>
</html>
